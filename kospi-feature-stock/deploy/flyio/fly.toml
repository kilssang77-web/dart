# Fly.io 수집 데몬 설정
# 배포: flyctl deploy --config deploy/flyio/fly.toml

app    = "quant-eye-collector"
region = "nrt"   # Tokyo (한국 최근접 리전)

[build]
  dockerfile = "collector/Dockerfile"

[env]
  KIS_BASE_URL    = "https://openapi.koreainvestment.com:9443"
  SCAN_INTERVAL_SEC = "180"
  INTRADAY_CONCURRENT = "5"
  INTRADAY_MIN_AMOUNT = "200000000"

# 상시기동 설정 (슬립 없음)
[http_service]
  internal_port        = 8080
  force_https          = false
  auto_stop_machines   = false   # ← 핵심: 자동 정지 비활성화
  auto_start_machines  = true
  min_machines_running = 1       # ← 항상 1대 유지

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# 시크릿 설정 (배포 후 별도 등록):
# flyctl secrets set \
#   POSTGRES_DSN="postgresql://..." \
#   KIS_APP_KEY="..." \
#   KIS_APP_SECRET="..." \
#   KIS_ACCOUNT_NO="..." \
#   API_URL="https://quant-eye-api.fly.dev" \
#   TELEGRAM_TOKEN="..." \
#   TELEGRAM_CHAT_ID="..."
