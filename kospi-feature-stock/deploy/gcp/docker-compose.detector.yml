version: '3.9'
# GCP e2-micro 장중 실시간 탐지 — 무료 구성
#
# collector-tick(256MB) + detector(128MB) = 384MB 대신
# intraday-poller(~120MB) 단일 서비스로 대체
#
# 메모리 사용:
#   API          : ~250MB (실측)
#   intraday-poller: ~120MB
#   OS + nginx   :  ~150MB
#   합계         :  ~520MB  →  e2-micro(1GB) 여유 있음
#
# 탐지 방식: WebSocket 대신 5분마다 KIS REST API 폴링
#   - 당일 누적 거래대금 × 시간보정 → AMOUNT_SURGE
#   - 당일 누적 거래량   × 시간보정 → VOLUME_SURGE
#   - dedup: Redis intraday_dedup:{code}:{event_type}:{date} (25h TTL)
#   - 탐지 즉시 feature_events 저장 + ch:feature 발행 → 추천 생성
#
# 실행 방법 (GCP VM SSH):
#   cd /opt/quant-eye/kospi-feature-stock/deploy/gcp
#   ln -sf ../../.env .env          # 최초 1회
#   docker compose up -d --build
#
# 로그:  docker compose logs -f intraday-poller
# 중지:  docker compose down

services:
  intraday-poller:
    build:
      context: ../../services/collector
      dockerfile: Dockerfile.tick
    container_name: fstock-intraday-poller
    command: ["python", "entrypoints/intraday_poller.py"]
    env_file: .env
    environment:
      SERVICE_NAME:        intraday-poller
      POLL_INTERVAL_SEC:   "300"       # 5분
      INTRADAY_CONCURRENT: "5"
      AMOUNT_SURGE_RATIO:  "5.0"
      VOL_SURGE_RATIO:     "5.0"
      MIN_AMOUNT:          "500000000" # 5억
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 150m
          cpus: '0.3'
        reservations:
          memory: 80m
