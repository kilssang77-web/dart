bind 0.0.0.0
protected-mode no
port 6379

# 메모리 설정
maxmemory 2gb
maxmemory-policy allkeys-lru

# 영속성 (AOF)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# RDB 스냅샷
save 900 1
save 300 10
save 60 10000

# 성능 튜닝
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 20
aof-rewrite-incremental-fsync yes

# 로그
loglevel notice
logfile ""

# 데이터베이스 수
databases 8

# Pub/Sub 알림 (키 이벤트)
notify-keyspace-events ""

# 슬로우 로그
slowlog-log-slower-than 10000
slowlog-max-len 128
