global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "fstock-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "fstock-ml"
    static_configs:
      - targets: ["ml:8001"]
    metrics_path: /metrics
