# quant-eye API - Fly.io
app            = "quant-eye-api"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.flyio"

[env]
  R2_BUCKET = "quant-eye-history"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval     = "30s"
    method       = "GET"
    timeout      = "10s"
    path         = "/health"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
