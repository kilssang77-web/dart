# quant-eye API — Fly.io 설정
# 배포: kospi-feature-stock/services/api/ 에서 실행
#   flyctl launch --name quant-eye-api --no-deploy   (최초 1회)
#   flyctl deploy

app    = "quant-eye-api"
region = "nrt"   # Tokyo (한국 최근접 리전)

[build]
  dockerfile = "Dockerfile.flyio"   # services/api/Dockerfile.flyio

[env]
  R2_BUCKET = "quant-eye-history"

# 상시기동 (슬립 없음)
[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false   # ← 핵심: 자동 정지 비활성화
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    timeout      = "10s"
    path         = "/health"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# 시크릿 등록 (배포 전 별도 실행):
# flyctl secrets set \
#   POSTGRES_DSN="postgresql://postgres:[PW]@db.[ID].supabase.co:5432/postgres" \
#   REDIS_URL="rediss://default:[TOKEN]@[HOST].upstash.io:6379" \
#   ML_SERVICE_URL="https://[USERNAME]-quant-eye-ml.hf.space" \
#   R2_ACCOUNT_ID="..." \
#   R2_ACCESS_KEY="..." \
#   R2_SECRET_KEY="..." \
#   JWT_SECRET_KEY="[32자 이상 랜덤 문자열]" \
#   DEFAULT_ADMIN_USERNAME="admin" \
#   DEFAULT_ADMIN_PASSWORD="[강력한 비밀번호]" \
#   CORS_ORIGINS="https://quant-eye.pages.dev"
