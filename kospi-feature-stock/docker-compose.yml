version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: fstock-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./infra/postgres/V6__watchlist.sql:/docker-entrypoint-initdb.d/02_V6__watchlist.sql
      - ./infra/postgres/V7__telegram_logs.sql:/docker-entrypoint-initdb.d/03_V7__telegram_logs.sql
      - ./infra/postgres/V8__recommendation_performance.sql:/docker-entrypoint-initdb.d/04_V8__recommendation_performance.sql
      - ./infra/postgres/V9__backfill_rec_performance.sql:/docker-entrypoint-initdb.d/05_V9__backfill_rec_performance.sql
      - ./infra/postgres/V11__redis_stats_backup.sql:/docker-entrypoint-initdb.d/06_V11__redis_stats_backup.sql
    shm_size: '512m'
    command: >
      postgres
        -c shared_preload_libraries='timescaledb,pg_stat_statements'
        -c max_connections=80
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c autovacuum_vacuum_cost_delay=20ms
        -c autovacuum_max_workers=2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2560m
          cpus: '2.0'
        reservations:
          memory: 1024m

  redis:
    image: redis:7-alpine
    container_name: fstock-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.3'

  # ── Application Services ────────────────────────────────────────────────────
  # ── Collector: 실시간 틱 + 분봉 (WebSocket 중심) ──────────────────────────
  collector-tick:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.tick
    container_name: fstock-collector-tick
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-tick
    volumes:
      - ./services/collector:/app
      - ./scripts:/scripts
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.3'

  # ── Collector: 일봉 수집 + 기술지표 + EOD 수급 ────────────────────────────
  collector-daily:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-daily
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-daily
    volumes:
      - ./services/collector:/app
      - ./scripts:/scripts
    command: ["python", "entrypoints/daily_bar_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.3'

  # ── Collector: 장중 수급 (30분 간격) ────────────────────────────────────────
  collector-supply:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.tick
    container_name: fstock-collector-supply
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-supply
    volumes:
      - ./services/collector:/app
    command: ["python", "entrypoints/supply_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  # ── Collector: 뉴스 + 공시 (DART/KIND) ──────────────────────────────────────
  collector-news:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-news
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-news
    volumes:
      - ./services/collector:/app
    command: ["python", "entrypoints/news_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.3'

  # ── Collector: 배치 탐지 (장 마감 후) ───────────────────────────────────────
  collector-batch:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-batch
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-batch
    volumes:
      - ./services/collector:/app
    command: ["python", "entrypoints/batch_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  # ── Collector: 재무 데이터 수집 (주 1회) ────────────────────────────────────
  collector-financials:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-financials
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-financials
    volumes:
      - ./services/collector:/app
    command: ["python", "entrypoints/financials_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  # ── Collector: 금융위원회 시가총액 (일 1회, 18:00 KST 이후) ────────────────
  collector-govdata:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-govdata
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-govdata
    volumes:
      - ./services/collector:/app
    command: ["python", "entrypoints/govdata_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  # ── Collector: 일봉 재백필 (장외 시간, 매일) ────────────────────────────────
  collector-bars-backfill:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-bars-backfill
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-bars-backfill
      BARS_BACKFILL_DAYS: "3285"   # 9년치 (2018년 이후 전체)
    volumes:
      - ./services/collector:/app
    command: ["python", "entrypoints/backfill_bars_worker.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ── Collector: 히스토리 백필 (one-shot, profile=tools) ──────────────────────
  collector-backfill:
    build:
      context: ./services/collector
      dockerfile: Dockerfile.batch
    container_name: fstock-collector-backfill
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: collector-backfill
    volumes:
      - ./services/collector:/app
      - backfill_ckpt:/tmp
    command: ["python", "scripts/backfill_history.py", "--start", "20200101", "--end", "20250917", "--concurrency", "3"]
    profiles:
      - tools
    restart: "no"

  # ── ML: Walk-forward 훈련 (one-shot, profile=tools) ─────────────────────────
  ml-train:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: fstock-ml-train
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: ml-train
    volumes:
      - ./services/ml:/app
      - model_cache:/models
    command: >
      python walk_forward_train.py
        --train-start 2020-01-01 --train-end 2023-12-31
        --val-start   2024-01-01 --val-end   2024-12-31
        --test-start  2025-01-01 --test-end  2025-12-31
        --label-mode relative
        --smote
        --max-codes 600
        --model-dir /models/lgbm
        --optuna-trials 0
    profiles:
      - tools
    restart: "no"

  detector:
    build:
      context: ./services/detector
      dockerfile: Dockerfile
    container_name: fstock-detector
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: detector
    volumes:
      - ./services/detector:/app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.3'

  analyzer:
    build:
      context: ./services/analyzer
      dockerfile: Dockerfile
    container_name: fstock-analyzer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: analyzer
    volumes:
      - ./services/analyzer:/app
      - model_cache:/models
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: '1.0'
        reservations:
          memory: 512m

  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: fstock-ml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: ml
      ML_API_PORT: "${ML_API_PORT:-8001}"
    ports:
      - "${ML_API_PORT:-8001}:8001"
    volumes:
      - ./services/ml:/app
      - model_cache:/models
      - ./scripts:/scripts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  recommender:
    build:
      context: ./services/recommender
      dockerfile: Dockerfile
    container_name: fstock-recommender
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy
    env_file: .env
    environment:
      ML_SERVICE_URL: "http://ml:8001"
      REC_COOLDOWN_MINUTES: "60"
      REC_PERF_MIN_PROB: "0.30"
      REC_RECOVERY_HOURS: "24"
    volumes:
      - ./services/recommender:/app
      - model_cache:/models
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  notifier:
    build:
      context: ./services/notifier
      dockerfile: Dockerfile
    container_name: fstock-notifier
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: notifier
      NOTIFIER_PORT: "${NOTIFIER_PORT:-8003}"
    ports:
      - "${NOTIFIER_PORT:-8003}:8003"
    volumes:
      - ./services/notifier:/app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: fstock-api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      ML_SERVICE_URL: "http://ml:8001"
    volumes:
      - ./services/api:/app
      - model_cache:/models
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── ML: 자동 월별 재학습 (매월 28일 00:00 KST) ─────────────────────────────
  ml-autoretrain:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    container_name: fstock-ml-autoretrain
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: ml-autoretrain
      LGBM_MODEL_DIR: /models/lgbm
      ML_MIN_AUC_THRESHOLD: "0.57"
      ML_RETRAIN_TRAIN_YEARS: "8"
      ML_RETRAIN_DAY: "28"
      ML_RETRAIN_HOUR: "0"
    volumes:
      - ./services/ml:/app
      - model_cache:/models
    command: ["python", "auto_retrain.py"]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.2'

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: fstock-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - api
      - ml
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.2'

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fstock-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.2'

volumes:
  postgres_data:
  redis_data:
  model_cache:
  backfill_ckpt:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: fstock-network
    driver: bridge
