name: 수급 데이터 수집 (장중 30분 주기)

on:
  schedule:
    # 09:30~15:30 KST = 00:30~06:30 UTC, 평일, 30분 간격
    - cron: '30 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  collect-supply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kospi-feature-stock/services/collector/requirements.txt

      - name: 의존성 설치
        run: |
          pip install asyncpg httpx pandas numpy orjson python-dotenv tenacity

      - name: 수급 수집 실행
        env:
          POSTGRES_DSN:    ${{ secrets.POSTGRES_DSN }}
          REDIS_URL:       ${{ secrets.REDIS_URL }}
          KIS_APP_KEY:     ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:  ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:  ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_BASE_URL:    ${{ secrets.KIS_BASE_URL }}
          SUPPLY_INTERVAL_SEC: "0"   # Actions에서는 1회만 실행
        run: |
          cd kospi-feature-stock
          python services/collector/entrypoints/supply_worker.py --once
