name: 자동매매 배치 (장중 10분 간격)

on:
  schedule:
    # 09:05~15:55 KST = 00:05~06:55 UTC, 10분 간격, 평일
    - cron: '5,15,25,35,45,55 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  batch-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kospi-feature-stock/services/trader/requirements.txt

      - name: 의존성 설치 (trader)
        run: |
          pip install -r kospi-feature-stock/services/trader/requirements.txt

      - name: 배치 자동매매 실행
        timeout-minutes: 5
        env:
          POSTGRES_DSN:     ${{ secrets.POSTGRES_DSN }}
          REDIS_URL:        ${{ secrets.REDIS_URL }}
          KIS_APP_KEY:      ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:   ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:   ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_BASE_URL:     ${{ secrets.KIS_BASE_URL }}
          KIS_IS_PAPER:     "true"
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADER_LOOKBACK_MIN: "30"
          TRADER_MAX_TRADES:   "3"
        run: |
          cd kospi-feature-stock
          python services/trader/entrypoints/batch_trader.py

      - name: 실패 시 Discord 알림
        if: failure()
        run: |
          [ -z "${{ secrets.DISCORD_WEBHOOK }}" ] && exit 0
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ **자동매매 배치 실패** — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' || true
