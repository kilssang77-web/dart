name: API 배포 (GCP VM)

on:
  push:
    branches: [master]
    paths:
      - 'kospi-feature-stock/services/api/**'
      - 'kospi-feature-stock/frontend/src/**'
      - 'kospi-feature-stock/frontend/package*.json'
      - 'kospi-feature-stock/frontend/vite.config.*'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kospi-feature-stock/frontend/package-lock.json

      - name: 프론트엔드 빌드
        working-directory: kospi-feature-stock/frontend
        run: |
          npm ci
          npm run build

      - name: 빌드된 static 파일 커밋 (해시 동기화)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kospi-feature-stock/services/api/static/
          if git diff --cached --quiet; then
            echo "static 파일 변경 없음 — skip"
          else
            # 최신 main 기준 임시 브랜치 생성 → static 파일만 적용 → 충돌 방지
            git fetch origin main
            git checkout -b _sync_static FETCH_HEAD
            git checkout master -- kospi-feature-stock/services/api/static/
            git add kospi-feature-stock/services/api/static/
            git commit -m "chore(frontend): 빌드 산출물 동기화 $(date +'%Y-%m-%d')"
            git push origin _sync_static:main
          fi

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: kospi-feature-stock/services/api
          file: kospi-feature-stock/services/api/Dockerfile.slim
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quant-eye-api:latest

      - name: GCP VM 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u kilssang77-web --password-stdin
            docker pull ghcr.io/kilssang77-web/quant-eye-api:latest
            docker stop quant-eye-api || true
            docker rm quant-eye-api || true
            docker run -d \
              --name quant-eye-api \
              --env-file ~/app/kospi-feature-stock/services/api/.env \
              -p 8000:8000 \
              --restart unless-stopped \
              ghcr.io/kilssang77-web/quant-eye-api:latest
