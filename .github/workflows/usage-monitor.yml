name: 인프라 상태 모니터 (주간)

on:
  schedule:
    # 매주 월요일 09:00 KST = 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  usage-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: GCP VM 헬스체크
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 https://34.173.186.160.nip.io/health || echo "000")
          echo "GCP VM /health → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::GCP VM 응답 이상 (HTTP $STATUS)"
            ALERT=true
          fi

      - name: GitHub Actions 사용량 확인
        run: |
          echo "이번 달 워크플로 실행 현황:"
          echo "  - collector-daily  : 평일 1회/일 (월 ~22회)"
          echo "  - collector-news   : 평일 14회/일 (월 ~308회)"
          echo "  - collector-supply : 평일 13회/일 (월 ~286회)"
          echo "  - ml-retrain       : 월 2회"
          echo "  - deploy-api       : push 시"
          echo "  - db-retention     : 매일 1회 (월 ~30회)"
          echo "GitHub Actions 무료 한도: 2,000분/월"

      - name: Discord 주간 상태 보고
        if: always()
        run: |
          [ -z "${{ secrets.DISCORD_WEBHOOK }}" ] && exit 0
          GCP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 https://34.173.186.160.nip.io/health || echo "000")
          if [ "$GCP_STATUS" = "200" ]; then
            GCP_MSG="✅ GCP VM 정상"
          else
            GCP_MSG="❌ GCP VM 이상 (HTTP $GCP_STATUS)"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📊 **주간 인프라 현황**\n${GCP_MSG}\n✅ Supabase: 외부 접속\n✅ Upstash Redis: 외부 접속\"}" || true
