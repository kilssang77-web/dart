name: ML 자동 재학습 (매월 1일·15일)

on:
  schedule:
    # 매월 1일, 15일 09:00 KST = 00:00 UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: '강제 재학습 (AUC 검증 무시)'
        required: false
        default: 'false'

jobs:
  ml-retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 현재 모델 커밋 해시 저장 (롤백용)
        id: save_model_ref
        run: |
          SHA=$(git log -1 --format=%H -- kospi-feature-stock/services/api/lgbm_export/ 2>/dev/null || echo "")
          echo "model_sha=$SHA" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kospi-feature-stock/services/ml/requirements.txt

      - name: ML 의존성 설치
        run: |
          pip install lightgbm xgboost scikit-learn pandas numpy asyncpg \
                      imbalanced-learn optuna shap joblib orjson \
                      python-dotenv

      - name: ML 재학습 실행
        env:
          POSTGRES_DSN:           ${{ secrets.POSTGRES_DSN }}
          LGBM_MODEL_DIR:         kospi-feature-stock/services/api/lgbm_export
          ML_MIN_AUC_THRESHOLD:   "0.57"
          ML_RETRAIN_TRAIN_YEARS: "8"
          DISCORD_WEBHOOK:        ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          mkdir -p kospi-feature-stock/services/api/lgbm_export
          cd kospi-feature-stock
          python services/ml/walk_forward_train.py \
            --train-start 2018-01-01 --train-end 2023-12-31 \
            --val-start   2024-01-01 --val-end   2024-12-31 \
            --test-start  2025-01-01 --test-end  2025-12-31 \
            --label-mode market_alpha \
            --smote \
            --max-codes 600 \
            --model-dir services/api/lgbm_export \
            --optuna-trials 30 \
            --event-only

      - name: 새 모델 git commit → Docker 이미지 자동 갱신 트리거
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kospi-feature-stock/services/api/lgbm_export/
          if git diff --cached --quiet; then
            echo "모델 파일 변경 없음 — commit 생략"
          else
            git commit -m "chore(ml): 자동 재학습 모델 갱신 $(date +'%Y-%m-%d')"
            git push origin master
            echo "모델 commit 완료 → deploy-api.yml 자동 트리거"
          fi

      - name: 재학습 실패 시 이전 모델 복구
        if: failure() && steps.save_model_ref.outputs.model_sha != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout ${{ steps.save_model_ref.outputs.model_sha }} -- kospi-feature-stock/services/api/lgbm_export/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "hotfix(ml): 재학습 실패 — $(date +'%Y-%m-%d') 이전 모델로 복구"
            git push origin master
            echo "이전 모델 복구 완료"
          else
            echo "복구할 모델 변경 없음 (첫 학습 실패 또는 동일 모델)"
          fi

      - name: 재학습 완료 Discord 알림
        if: always()
        run: |
          [ -z "${{ secrets.DISCORD_WEBHOOK }}" ] && exit 0
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ **ML 재학습 완료** — 새 모델이 Docker 이미지에 반영됩니다."
          else
            MSG="❌ **ML 재학습 실패** — 로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" || true
