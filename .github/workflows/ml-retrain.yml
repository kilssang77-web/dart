name: ML 자동 재학습 (매월 1일·15일)

on:
  schedule:
    # 매월 1일, 15일 09:00 KST = 00:00 UTC
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: '강제 재학습 (AUC 검증 무시)'
        required: false
        default: 'false'

jobs:
  ml-retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kospi-feature-stock/services/ml/requirements.txt

      - name: ML 의존성 설치
        run: |
          pip install lightgbm scikit-learn pandas numpy asyncpg \
                      imbalanced-learn optuna shap joblib orjson \
                      python-dotenv boto3

      - name: ML 재학습 실행
        env:
          POSTGRES_DSN:           ${{ secrets.POSTGRES_DSN }}
          LGBM_MODEL_DIR:         /tmp/models/lgbm
          ML_MIN_AUC_THRESHOLD:   "0.57"
          ML_RETRAIN_TRAIN_YEARS: "8"
          DISCORD_WEBHOOK:        ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          mkdir -p /tmp/models/lgbm
          cd kospi-feature-stock
          python services/ml/walk_forward_train.py \
            --train-start 2018-01-01 --train-end 2023-12-31 \
            --val-start   2024-01-01 --val-end   2024-12-31 \
            --test-start  2025-01-01 --test-end  2025-12-31 \
            --label-mode relative \
            --smote \
            --max-codes 600 \
            --model-dir /tmp/models/lgbm \
            --optuna-trials 20

      - name: 모델 R2에 업로드
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY:  ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:  ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET:      ${{ secrets.R2_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3, os, pathlib
          from botocore.config import Config

          s3 = boto3.client(
              "s3",
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ["R2_ACCESS_KEY"],
              aws_secret_access_key=os.environ["R2_SECRET_KEY"],
              config=Config(signature_version="s3v4"),
              region_name="auto",
          )
          bucket = os.environ["R2_BUCKET"]
          model_dir = pathlib.Path("/tmp/models/lgbm")
          for f in model_dir.iterdir():
              if f.is_file():
                  key = f"models/lgbm/{f.name}"
                  s3.upload_file(str(f), bucket, key)
                  print(f"업로드: {key}")
          print("모델 R2 업로드 완료")
          EOF

      - name: 재학습 완료 Discord 알림
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ **ML 재학습 완료** — 새 모델이 R2에 배포되었습니다."
          else
            MSG="❌ **ML 재학습 실패** — 로그 확인: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" || true