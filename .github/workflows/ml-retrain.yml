name: ML 자동 재학습 (격주)

on:
  schedule:
    # 매월 1일, 15일 00:00 KST = 15:00 UTC (전날)
    - cron: '0 15 L,14 * *'
  workflow_dispatch:
    inputs:
      force_retrain:
        description: '강제 재학습 (AUC 검증 무시)'
        required: false
        default: 'false'

jobs:
  ml-retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 최대 2시간

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kospi-feature-stock/services/ml/requirements.txt

      - name: ML 의존성 설치
        run: |
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.3.0
          pip install lightgbm scikit-learn pandas numpy asyncpg \
                      imbalanced-learn optuna shap joblib orjson \
                      python-dotenv sentence-transformers

      - name: ML 재학습 실행
        env:
          POSTGRES_DSN:          ${{ secrets.POSTGRES_DSN }}
          LGBM_MODEL_DIR:        /tmp/models/lgbm
          ML_MIN_AUC_THRESHOLD:  "0.57"
          ML_RETRAIN_TRAIN_YEARS: "8"
          DISCORD_WEBHOOK:       ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          mkdir -p /tmp/models/lgbm
          cd kospi-feature-stock
          python services/ml/walk_forward_train.py \
            --train-start 2018-01-01 --train-end 2023-12-31 \
            --val-start   2024-01-01 --val-end   2024-12-31 \
            --test-start  2025-01-01 --test-end  2025-12-31 \
            --label-mode relative \
            --smote \
            --max-codes 600 \
            --model-dir /tmp/models/lgbm \
            --optuna-trials 20

      - name: 모델 HF Spaces에 업로드
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_REPO_ID:  ${{ secrets.HF_REPO_ID }}   # username/quant-eye-ml
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          api.upload_folder(
              folder_path="/tmp/models/lgbm",
              repo_id=os.environ["HF_REPO_ID"],
              repo_type="model",
              path_in_repo="lgbm",
              token=os.environ["HF_TOKEN"],
          )
          print("모델 업로드 완료")
          EOF

      - name: 재학습 완료 Discord 알림
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ **ML 재학습 완료** — 새 모델이 HF Spaces에 배포되었습니다."
          else
            MSG="❌ **ML 재학습 실패** — 로그를 확인하세요: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"
