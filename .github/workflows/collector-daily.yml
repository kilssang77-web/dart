name: 일봉 수집 + 배치 탐지 + 추천 생성 (장 마감 후)

on:
  schedule:
    # 16:00 KST = 07:00 UTC, 평일
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  collect-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kospi-feature-stock/services/collector/requirements.txt

      - name: 의존성 설치 (collector)
        run: |
          pip install -r kospi-feature-stock/services/collector/requirements.txt

      - name: 일봉 수집 + 배치 탐지 실행
        env:
          POSTGRES_DSN:        ${{ secrets.POSTGRES_DSN }}
          REDIS_URL:           ${{ secrets.REDIS_URL }}
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_BASE_URL:        ${{ secrets.KIS_BASE_URL }}
          DART_API_KEY:        ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}
          DAILY_BACKFILL_DAYS: "5"
        run: |
          cd kospi-feature-stock
          python services/collector/entrypoints/daily_bar_worker.py

      - name: govdata 수집 (시가총액·상장주식수 갱신)
        continue-on-error: true
        env:
          POSTGRES_DSN:      ${{ secrets.POSTGRES_DSN }}
          REDIS_URL:         ${{ secrets.REDIS_URL }}
          KIS_APP_KEY:       ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:    ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:    ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_BASE_URL:      ${{ secrets.KIS_BASE_URL }}
          DART_API_KEY:      ${{ secrets.DART_API_KEY }}
          GOV_DATA_API_KEY:  ${{ secrets.GOV_DATA_API_KEY }}
        run: |
          cd kospi-feature-stock
          python services/collector/entrypoints/govdata_batch.py

      - name: 의존성 설치 (recommender)
        run: |
          pip install -r kospi-feature-stock/services/recommender/requirements.txt

      - name: 추천 생성 실행
        env:
          POSTGRES_DSN:     ${{ secrets.POSTGRES_DSN }}
          REDIS_URL:        ${{ secrets.REDIS_URL }}
          REC_RECOVERY_HOURS: "48"
          REC_COOLDOWN_MINUTES: "0"
        run: |
          cd kospi-feature-stock
          python services/recommender/entrypoints/daily_rec_worker.py

      - name: POST_DISCLOSURE_SURGE 탐지 (공시 후 주가 급등)
        continue-on-error: true
        env:
          POSTGRES_DSN:     ${{ secrets.POSTGRES_DSN }}
          REDIS_URL:        ${{ secrets.REDIS_URL }}
          DART_API_KEY:     ${{ secrets.DART_API_KEY }}
          PDS_MIN_CHANGE_RATE: "3.0"
          PDS_MIN_VOL_RATIO:   "2.0"
        run: |
          cd kospi-feature-stock
          python services/collector/entrypoints/disclosure_surge_scanner.py

      - name: 텔레그램 추천 알림
        if: success()
        continue-on-error: true
        env:
          POSTGRES_DSN:     ${{ secrets.POSTGRES_DSN }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd kospi-feature-stock
          python services/collector/entrypoints/notify_telegram.py

      - name: 실패 시 Discord 알림
        if: failure()
        run: |
          [ -z "${{ secrets.DISCORD_WEBHOOK }}" ] && exit 0
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ **일봉 수집/탐지/추천 실패** — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' || true
