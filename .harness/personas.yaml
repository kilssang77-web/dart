# .harness/personas.yaml
# AI 페르소나 docs 충실도 평가 카탈로그
#
# 각 페르소나는 stage에 따라 활성/약식/비활성으로 참여합니다.
# stages: active(전체 rubric), minimal(stage 해당 rubric만 + 가중 0.5x), off(호출 안 함)
#
# review_docs.py가 이 파일을 읽어 stage별 호출 대상을 결정합니다.

personas:
  - id: pm
    name: 프로덕트 매니저
    scope: ["PRD", "SCREEN_MAP"]
    stages:
      prototype: active
      mvp: active
      production: active
    weight_by_stage:
      prototype: 1.0
      mvp: 1.0
      production: 1.0
    critical_by_stage:
      prototype: false
      mvp: false
      production: false
    rubric_by_stage:
      prototype:
        - "프로젝트 한 줄 목표가 명확한가"
        - "최소 페르소나 1명과 핵심 기능 3개가 적혀 있는가"
      mvp:
        - "페르소나가 구체적이고 니즈가 측정 가능한가"
        - "핵심 기능이 사용자 가치(사용자는 ~할 수 있다)로 표현"
        - "MVP 제외 사항이 명시"
      production:
        - "성공 지표가 정량+측정 방법 포함"
        - "확장 페르소나(예: 관리자/감사자)까지 정의"
        - "릴리스 후 회수 가능한 가설(가치 검증) 명시"

  - id: architect
    name: 소프트웨어 아키텍트
    scope: ["ARCHITECTURE", "ADR", "PROJECT_STRUCTURE"]
    stages:
      prototype: active
      mvp: active
      production: active
    weight_by_stage:
      prototype: 1.0
      mvp: 1.2
      production: 1.3
    critical_by_stage:
      prototype: true
      mvp: true
      production: true
    rubric_by_stage:
      prototype:
        - "핵심 컴포넌트 1줄 다이어그램이 있는가"
        - "데이터 흐름 한 가지 시나리오라도 명시"
      mvp:
        - "레이어/모듈 경계가 명확"
        - "트레이드오프가 ADR에 기록"
        - "MSA면 서비스 경계·통신·게이트웨이 명시"
      production:
        - "확장점·통합점·실패 격리 경계 식별"
        - "비기능 요구(가용성·성능)와 구조가 정렬"
        - "주요 ADR이 최신 결정 반영(stale 없음)"

  - id: backend_lead
    name: 백엔드 리드
    scope: ["CODING_CONVENTION", "API_GUIDE", "ARCHITECTURE"]
    stages:
      prototype: minimal
      mvp: active
      production: active
    weight_by_stage:
      prototype: 0.5
      mvp: 1.0
      production: 1.0
    critical_by_stage:
      prototype: false
      mvp: false
      production: false
    rubric_by_stage:
      prototype:
        - "패키지 base 명명이 결정"
        - "진입점이 식별"
      mvp:
        - "에러 모델·페이지네이션 표준"
        - "트랜잭션·동시성 정책"
        - "API 명세에 인증 요구사항 포함"
      production:
        - "도메인 이벤트·idempotency 정책"
        - "외부 호출 타임아웃·재시도·서킷브레이커"

  - id: frontend_lead
    name: 프론트엔드 리드
    scope: ["UI_GUIDE", "SCREEN_MAP", "CODING_CONVENTION"]
    stages:
      prototype: minimal
      mvp: active
      production: active
    weight_by_stage:
      prototype: 0.5
      mvp: 1.0
      production: 1.0
    critical_by_stage:
      prototype: false
      mvp: false
      production: false
    rubric_by_stage:
      prototype:
        - "라우터·번들·렌더링 모델 결정"
        - "상태/서버데이터 관리 도구 명시"
      mvp:
        - "디렉토리 구조가 라우터 모델과 정합"
        - "공통 컴포넌트 스펙(버튼·입력·카드)"
      production:
        - "코드 분할·번들 사이즈 예산"
        - "에러 바운더리·로딩/스켈레톤 일관"
        - "접근성 회귀 자동화"

  - id: ux
    name: UX 디자이너
    scope: ["UI_GUIDE", "SCREEN_MAP"]
    stages:
      prototype: off
      mvp: active
      production: active
    weight_by_stage:
      mvp: 1.0
      production: 1.0
    critical_by_stage:
      mvp: false
      production: false
    project_type_override:
      b2c_consumer:
        stages:
          prototype: minimal
      mobile_first:
        stages:
          prototype: minimal
    rubric_by_stage:
      prototype:
        - "주요 화면 1~3개의 와이어 수준 설명"
      mvp:
        - "디자인 원칙 구체화 (AI 슬롭 안티패턴 포함)"
        - "주요 사용자 플로우 끊김 없음"
        - "빈/에러/로딩 상태 처리 정책"
      production:
        - "접근성(WCAG AA) 기준 명시"
        - "키보드 네비·스크린리더 시나리오"
        - "다국어/RTL/저성능 환경 고려"

  - id: security
    name: 보안 전문가
    scope: ["SECURITY", "API_GUIDE"]
    stages:
      prototype: minimal
      mvp: active
      production: active
    weight_by_stage:
      prototype: 1.0
      mvp: 1.3
      production: 1.5
    critical_by_stage:
      prototype: false
      mvp: true
      production: true
    project_type_override:
      financial:
        weight_by_stage:
          mvp: 1.8
          production: 2.0
      healthcare:
        critical_by_stage:
          mvp: true
          production: true
    rubric_by_stage:
      prototype:
        - "비밀값 하드코딩 없음"
        - "외부 입력 기본 검증"
      mvp:
        - "인증 모델 명확 (JWT/OIDC PKCE 등)"
        - "권한 검증 명세"
        - "비밀 환경변수화 + 노출 경로 차단"
      production:
        - "OWASP Top 10 매핑"
        - "secret rotation 정책 + 보관소(Vault 등)"
        - "감사 로그·개인정보 처리 방침"
        - "의존성 취약점 스캔(CI 통합)"

  - id: dba
    name: DBA / 데이터 엔지니어
    scope: ["SCHEMA"]
    stages:
      prototype: off
      mvp: active
      production: active
    weight_by_stage:
      mvp: 1.1
      production: 1.3
    critical_by_stage:
      mvp: false
      production: true
    project_type_override:
      data_heavy:
        stages:
          prototype: minimal
          mvp: active
          production: active
        critical_by_stage:
          mvp: true
          production: true
    rubric_by_stage:
      mvp:
        - "PK/FK/UK 명시"
        - "기본 인덱스 전략(자주 조회되는 컬럼)"
        - "마이그레이션 명명 규칙(V{n}__...sql)"
      production:
        - "조회 패턴별 인덱스/파티셔닝"
        - "백업·복구·복제 전략"
        - "대용량 마이그레이션 안전 절차(online schema change)"

  - id: qa
    name: QA 리드
    scope: ["TESTING", "API_GUIDE", "SECURITY"]
    stages:
      prototype: off
      mvp: minimal
      production: active
    weight_by_stage:
      mvp: 0.8
      production: 1.2
    critical_by_stage:
      mvp: false
      production: false
    rubric_by_stage:
      mvp:
        - "단위 테스트 도구·실행 명령 명시"
        - "핵심 시나리오 1개 통합 테스트 존재"
      production:
        - "커버리지 목표·측정"
        - "회귀·exploratory·계약 테스트"
        - "테스트 데이터·픽스처·격리"
        - "E2E 시나리오 목록"

  - id: devops
    name: DevOps / SRE
    scope: ["DEPLOYMENT", "PROJECT_STRUCTURE", "MCP_GUIDE"]
    stages:
      prototype: off
      mvp: minimal
      production: active
    weight_by_stage:
      mvp: 0.8
      production: 1.3
    critical_by_stage:
      mvp: false
      production: true
    rubric_by_stage:
      mvp:
        - "로컬 실행 절차(docker-compose 등) 명시"
        - "환경 변수 예시(.env.example) 존재"
      production:
        - "배포 형태와 이미지/번들 산출물 명확"
        - "환경(dev/stg/prod) 차이·시크릿 주입"
        - "로깅/메트릭/트레이싱 경로 + 보존 정책"
        - "롤백/카나리/블루그린 절차"

  - id: tech_writer
    name: 테크니컬 라이터
    scope: ["*"]
    stages:
      prototype: minimal
      mvp: active
      production: active
    weight_by_stage:
      prototype: 0.5
      mvp: 0.8
      production: 0.8
    critical_by_stage:
      prototype: false
      mvp: false
      production: false
    rubric_by_stage:
      prototype:
        - "README 또는 PRD가 30초 안에 프로젝트 의도 전달"
      mvp:
        - "용어 일관성"
        - "신규 팀원이 30분 안에 핵심 구조 이해 가능"
      production:
        - "용어집(GLOSSARY) 존재 또는 docs 간 용어 정합"
        - "외부 참조 링크 무결성"
        - "온보딩 체크리스트"

  - id: domain_expert
    name: 도메인 전문가 (프로젝트 유형 의존)
    scope: ["PRD", "SCHEMA", "SECURITY"]
    stages:
      prototype: off
      mvp: off
      production: off
    project_type_override:
      financial:
        stages:
          mvp: active
          production: active
        critical_by_stage:
          mvp: true
          production: true
        rubric_by_stage:
          mvp:
            - "거래 일관성(atomicity)·중복결제 방어"
            - "법규(PCI-DSS·전자금융감독규정) 핵심 항목 식별"
          production:
            - "감사 추적(audit trail) 보존 기간"
            - "분쟁 처리·환불 시나리오"
      healthcare:
        stages:
          mvp: active
          production: active
        rubric_by_stage:
          mvp:
            - "환자 식별자 분리 저장(가명화)"
          production:
            - "HIPAA / 의료법 식별 항목 매핑"

# ─── Stage별 채점·통과 정책 (기본값) ───────────────────────────────────────
# profile.json의 review 섹션으로 override 가능
thresholds:
  prototype:
    average: 70
    critical_min: 50
  mvp:
    average: 80
    critical_min: 60
  production:
    average: 90
    critical_min: 70

max_iterations: 3
