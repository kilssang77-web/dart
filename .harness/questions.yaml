schema_version: 1

# 단일 출처(SOT) — a2m_docs.md에서 옵션 매트릭스를 직접 기술하지 않고 이 파일을 참조한다.
# ask_questions.py 인터프리터가 이 파일을 읽어 컨텍스트에 맞는 옵션만 사용자에게 제시한다.

questions:

  # ──────────────────────────────────────────
  # 그룹 0: 기반 정보
  # ──────────────────────────────────────────

  - id: q0a
    title: 프로젝트 단계
    required: true
    type: choice
    options:
      - { value: prototype, label: "prototype — 빠른 검증·데모 목적. docs 4종" }
      - { value: mvp,       label: "mvp — 실사용자 대상 출시. docs 11종" }
      - { value: production, label: "production — 운영 목표. docs 12종" }
    affects:
      - "profile.json.stage"
    notes: "이후 모든 질문의 깊이·필수 여부·docs 분량이 이 값에 따라 달라진다."

  - id: q0b
    title: 참고 프로젝트
    required: false
    type: free_text
    affects:
      - "references.json"
    notes: "git URL 또는 로컬 절대 경로. 없으면 공백 또는 '없음'."

  - id: q0c
    title: 프로젝트 유형
    required: true
    type: choice
    options:
      - { value: b2c_consumer, label: "B2C 소비자 서비스" }
      - { value: b2b_internal, label: "B2B 또는 사내 도구" }
      - { value: financial,    label: "금융·결제·핀테크" }
      - { value: healthcare,   label: "의료·헬스케어" }
      - { value: data_heavy,   label: "데이터 파이프라인·분석" }
      - { value: infra_tool,   label: "인프라·DevOps 도구" }
      - { value: mobile_first, label: "모바일 우선 서비스" }
      - { value: gov,          label: "공공·정부" }
      - { value: open_source,  label: "오픈소스 라이브러리·프레임워크" }
    affects:
      - "profile.json.project_type"
    notes: |
      financial/healthcare 선택 시: personas.yaml의 security persona 가중치가 자동 상향된다.
      data_heavy 선택 시: q10(DB 스키마)에서 샤딩 질문이 강제된다.

  # ──────────────────────────────────────────
  # 그룹 1-2: 프로젝트 정의
  # ──────────────────────────────────────────

  - id: q1
    title: 프로젝트 개요
    required: true
    type: composite
    fields:
      - { id: project_name, prompt: "프로젝트 이름", default: "" }
      - { id: summary,      prompt: "한 줄 소개 (누가 / 어떤 문제 해결)", default: "" }
    affects:
      - "profile.json.project_name"
      - "PRD.md / 프로젝트 개요"

  - id: q2
    title: 사용자·유스케이스·MVP 범위
    required: true
    type: composite
    fields:
      - { id: personas,  prompt: "주요 사용자 그룹 (페르소나)", default: "" }
      - { id: features,  prompt: "핵심 기능 3~5가지", default: "" }
      - { id: out_scope, prompt: "이번 버전에서 제외할 기능 (없으면 공백)", default: "" }
    affects:
      - "PRD.md / 사용자 페르소나"
      - "PRD.md / 핵심 기능"
      - "PRD.md / 이번 버전 범위"

  # ──────────────────────────────────────────
  # 그룹 3: 기술 스택
  # ──────────────────────────────────────────

  - id: q3
    title: 기술 스택
    required: true
    type: composite
    fields:
      - { id: backend,          prompt: "Backend 프레임워크 (없으면 '없음')", default: "spring-boot-3" }
      - { id: frontend,         prompt: "Frontend (없으면 '없음')", default: "react-18" }
      - { id: db,               prompt: "주 DBMS", default: "postgresql" }
      - { id: language_version, prompt: "언어 버전 (예: Java 21, Node 22)", default: "" }
      - { id: deploy,           prompt: "배포 대상 (docker / k8s / lambda / paas / onprem)", default: "docker" }
    affects:
      - "profile.json.tech"
      - "ADR.md / ADR-001"
      - "ARCHITECTURE.md"

  - id: q3_5
    title: 백엔드 아키텍처 스타일
    required: true
    depends_on: q3
    type: choice_with_followups
    options:
      - { value: monolith,          label: "단일 모놀리스 — 하나의 빌드/배포 단위" }
      - { value: modular_monolith,  label: "모듈러 모놀리스 — 하나의 빌드, 도메인 모듈 분리" }
      - { value: msa,               label: "MSA — 여러 빌드/배포 단위, 서비스 간 통신" }
      - { value: baas,              label: "백엔드 없음 (BaaS / Edge functions / Serverless)" }
    follow_ups:
      msa:
        - id: msa_services
          type: list
          prompt: "서비스 이름 목록 (예: auth-service, post-service, gateway)"
        - id: msa_comm
          type: choice
          prompt: "서비스 간 통신"
          options:
            - { value: rest,    label: "REST" }
            - { value: grpc,    label: "gRPC" }
            - { value: kafka,   label: "Kafka" }
            - { value: rabbit,  label: "RabbitMQ" }
            - { value: mixed,   label: "혼합" }
        - id: msa_gateway
          type: choice
          prompt: "API Gateway"
          options:
            - { value: spring_cloud, label: "Spring Cloud Gateway" }
            - { value: nginx,        label: "Nginx" }
            - { value: kong,         label: "Kong" }
            - { value: none,         label: "없음" }
        - id: msa_discovery
          type: choice
          prompt: "서비스 디스커버리"
          options:
            - { value: eureka,       label: "Eureka" }
            - { value: consul,       label: "Consul" }
            - { value: k8s_service,  label: "k8s service" }
            - { value: none,         label: "없음" }
        - id: msa_tx
          type: choice
          prompt: "분산 트랜잭션 전략"
          options:
            - { value: saga,          label: "Saga 패턴" }
            - { value: eventual,      label: "최종 일관성" }
            - { value: avoid_design,  label: "트랜잭션 회피 설계" }
      modular_monolith:
        - id: mm_modules
          type: list
          prompt: "모듈 경계 목록 (예: auth, post, user, notification)"
        - id: mm_dep_rule
          type: free_text
          prompt: "모듈 간 의존 방향 규칙 (예: 상위→하위, 단방향 금지)"
    affects:
      - "profile.json.architecture.style"
      - "profile.json.architecture.services"
      - "ARCHITECTURE.md"
      - "ADR.md"
      - "PROJECT_STRUCTURE.md"

  - id: q3_6
    title: 패키지/모듈 명명
    required: true
    depends_on: q3
    type: composite
    fields:
      - { id: backend_pkg,  prompt: "Backend 최상위 패키지 (예: com.acme.board)", default: "" }
      - { id: frontend_pkg, prompt: "Frontend npm scope/이름 (예: @acme/board-web)", default: "" }
    affects:
      - "CODING_CONVENTION.md / 패키지 명명 규칙"

  - id: q3_7
    title: 프론트엔드 라우팅·번들·렌더링
    required: true
    depends_on: q3
    skip_if: { q3.frontend: ["없음", "none", ""] }
    type: composite
    fields:
      - id: router
        prompt: "라우터"
        options:
          - { value: tanstack_router,    label: "TanStack Router" }
          - { value: react_router,       label: "React Router" }
          - { value: nextjs_app_router,  label: "Next.js App Router" }
          - { value: nextjs_pages_router, label: "Next.js Pages Router" }
          - { value: remix,              label: "Remix" }
          - { value: vue_router,         label: "Vue Router" }
          - { value: sveltekit,          label: "SvelteKit" }
      - id: bundler
        prompt: "번들러"
        options:
          - { value: vite,       label: "Vite" }
          - { value: nextjs_bundler, label: "Next.js 내장" }
          - { value: webpack,    label: "Webpack" }
          - { value: turbopack,  label: "Turbopack" }
      - id: rendering
        prompt: "렌더링 방식"
        options:
          - { value: csr,    label: "CSR" }
          - { value: ssr,    label: "SSR" }
          - { value: ssg,    label: "SSG" }
          - { value: isr,    label: "ISR" }
          - { value: hybrid, label: "Hybrid" }
      - id: server_data
        prompt: "서버 데이터 라이브러리"
        options:
          - { value: tanstack_query, label: "TanStack Query" }
          - { value: swr,            label: "SWR" }
          - { value: rtk_query,      label: "RTK Query" }
          - { value: apollo,         label: "Apollo (GraphQL)" }
          - { value: trpc,           label: "tRPC" }
      - id: form
        prompt: "폼 라이브러리"
        options:
          - { value: react_hook_form, label: "react-hook-form" }
          - { value: formik,          label: "formik" }
          - { value: native,          label: "직접 / 프레임워크 내장" }
    affects:
      - "profile.json.architecture.frontend_router"
      - "PROJECT_STRUCTURE.md / src/routes 트리"
      - "CODING_CONVENTION.md"

  # ──────────────────────────────────────────
  # 그룹 4: 리포 구성
  # ──────────────────────────────────────────

  - id: q4
    title: 리포 구성
    required: true
    depends_on: q3_5
    type: choice_matrix
    matrix:
      - when: { q3_5: monolith }
        options:
          - { value: monorepo,   label: "모노레포 (backend/ + frontend/)", default: true, recommended_when: always }
          - { value: multirepo,  label: "멀티레포" }
      - when: { q3_5: modular_monolith }
        options:
          - { value: monorepo,   label: "모노레포 — 사실상 필수 (backend/modules/{domain}/, frontend/src/features/{domain}/)", default: true, locked: true }
      - when: { q3_5: msa }
        options:
          - { value: multirepo,  label: "멀티레포 (서비스별 별도 저장소)" }
          - { value: nx_mono,    label: "Nx·Turborepo 모노레포 (services/, apps/, libs/)", default: true, recommended_when: always }
          - { value: hybrid,     label: "Hybrid (공유 lib는 모노, 서비스는 멀티)" }
      - when: { q3_5: baas }
        options:
          - { value: single_fe,  label: "frontend 단일 리포 (web/)", default: true, locked: true }
    affects:
      - "profile.json.architecture.repo_layout"
      - "PROJECT_STRUCTURE.md"
      - "ARCHITECTURE.md"

  # ──────────────────────────────────────────
  # 그룹 5: 인증
  # ──────────────────────────────────────────

  - id: q5
    title: 인증 방식
    required: true
    depends_on: [q3_5]
    type: choice_with_followups
    options:
      - { value: session, label: "세션 기반 (서버 세션 + 쿠키) — 모놀리스에 자연스러움", recommended_when: { q3_5: [monolith, modular_monolith] } }
      - { value: jwt,     label: "JWT (Access + Refresh) — MSA/SPA에 자연스러움", recommended_when: { q3_5: msa } }
      - { value: social,  label: "소셜 로그인 (OAuth2 / OIDC) — 외부 IdP 위임" }
      - { value: mixed,   label: "두 가지 이상 혼합" }
      - { value: none,    label: "없음 (별도 요구 없음)" }
    follow_ups_when_stage_gte: mvp
    follow_ups:
      jwt:
        - id: jwt_access_ttl
          type: free_text
          prompt: "Access Token TTL (예: 15m)"
          default: "15m"
        - id: jwt_refresh_ttl
          type: free_text
          prompt: "Refresh Token TTL (예: 7d)"
          default: "7d"
        - id: jwt_rotation
          type: bool
          prompt: "Refresh Token 로테이션 사용 여부"
          default: true
        - id: jwt_revocation
          type: bool
          prompt: "블랙리스트/Revocation List 사용 여부"
          default: false
    follow_ups_shared:
      - id: tfa
        type: choice
        prompt: "2FA 정책"
        options:
          - { value: none,    label: "없음" }
          - { value: totp,    label: "TOTP (Google Authenticator)" }
          - { value: sms,     label: "SMS" }
          - { value: email,   label: "Email OTP" }
          - { value: webauthn, label: "WebAuthn (Passkey)" }
      - id: magic_link
        type: bool
        prompt: "Magic link 사용 여부"
        default: false
      - id: pw_policy
        type: composite
        prompt: "비밀번호 정책"
        fields:
          - { id: min_length,   prompt: "최소 길이", default: "8" }
          - { id: complexity,   prompt: "복잡도 (예: 영문+숫자+특수문자)", default: "" }
          - { id: expiry_days,  prompt: "만료 기간(일, 없으면 0)", default: "0" }
          - { id: no_reuse,     prompt: "재사용 금지 횟수 (없으면 0)", default: "0" }
    affects:
      - "SECURITY.md / 인증"
      - "SECURITY.md / 비밀번호 정책"
      - "SECURITY.md / 토큰 정책"
      - "profile.json.tech.auth"

  - id: q5b
    title: 외부 인증 제공자 (OIDC/OAuth2)
    required: false
    required_if: { q5: [social, mixed] }
    skip_if: { q5: [session, jwt, none] }
    depends_on: q5
    type: multi_choice
    options:
      - { value: google,    label: "Google" }
      - { value: apple,     label: "Apple" }
      - { value: github,    label: "GitHub" }
      - { value: microsoft, label: "Microsoft" }
      - { value: kakao,     label: "카카오" }
      - { value: naver,     label: "네이버" }
      - { value: toss,      label: "토스" }
      - { value: payco,     label: "NHN PAYCO" }
      - { value: saml,      label: "SAML (기업 SSO)" }
      - { value: ldap,      label: "LDAP / Active Directory" }
      - { value: keycloak,  label: "Keycloak (자체 IdP)" }
      - { value: okta,      label: "Okta" }
      - { value: auth0,     label: "Auth0" }
      - { value: cognito,   label: "AWS Cognito" }
    follow_ups:
      all:
        - id: pkce
          type: bool
          prompt: "PKCE 사용 여부 (SPA/모바일이면 필수 권장)"
          default: true
    affects:
      - "SECURITY.md / OIDC 제공자"
      - "ADR.md"

  # ──────────────────────────────────────────
  # 그룹 6: 코딩 컨벤션
  # ──────────────────────────────────────────

  - id: q6a
    title: 코딩 스타일 가이드
    required: true
    depends_on: [q3]
    type: choice_matrix
    matrix:
      - when: { "q3.backend": "spring-boot-3" }
        language: backend
        options:
          - { value: google_java,       label: "Google Java Style Guide" }
          - { value: oracle_conventions, label: "Oracle Code Conventions" }
          - { value: custom_java,       label: "자체 정의" }
      - when: { "q3.backend": "spring-boot-3-kotlin" }
        language: backend
        options:
          - { value: ktlint_default, label: "ktlint 기본" }
          - { value: detekt_custom,  label: "Detekt + 자체" }
          - { value: custom_kotlin,  label: "자체" }
      - when: { "q3.backend": "nestjs" }
        language: backend
        options:
          - { value: airbnb_ts,          label: "Airbnb TypeScript" }
          - { value: standard_js,        label: "StandardJS" }
          - { value: prettier_eslint,    label: "Prettier + ESLint recommended" }
          - { value: biome,              label: "Biome 기본" }
          - { value: custom_ts_be,       label: "자체" }
      - when: { "q3.backend": ["fastapi", "django"] }
        language: backend
        options:
          - { value: pep8_black,  label: "PEP 8 + Black" }
          - { value: ruff,        label: "Ruff (All-in-one)" }
          - { value: custom_py,   label: "자체" }
      - when: { "q3.backend": ["gin", "echo", "fiber"] }
        language: backend
        options:
          - { value: gofmt_golangci, label: "gofmt + golangci-lint (사실상 표준)", default: true, locked: true }
      - when: { "q3.backend": "aspnet" }
        language: backend
        options:
          - { value: editorconfig_roslyn, label: ".editorconfig + Roslyn analyzer" }
          - { value: custom_csharp,       label: "자체" }
      - when: { "q3.backend": ["actix", "axum"] }
        language: backend
        options:
          - { value: rustfmt_clippy, label: "rustfmt + clippy (사실상 표준)", default: true, locked: true }
      - when: { "q3.frontend": ["react-18", "nextjs", "remix"] }
        language: frontend
        options:
          - { value: airbnb_js,           label: "Airbnb JS/TS Style" }
          - { value: standard_js_fe,      label: "StandardJS" }
          - { value: prettier_eslint_fe,  label: "Prettier + ESLint recommended" }
          - { value: biome_fe,            label: "Biome (단일 도구)" }
          - { value: custom_fe,           label: "자체" }
      - when: { "q3.frontend": ["vue3", "nuxt"] }
        language: frontend
        options:
          - { value: vue_official, label: "Vue 공식 스타일 가이드 + Prettier" }
          - { value: biome_vue,    label: "Biome" }
          - { value: custom_vue,   label: "자체" }
      - when: { "q3.frontend": ["svelte", "sveltekit"] }
        language: frontend
        options:
          - { value: svelte_official, label: "Svelte 공식 + Prettier" }
          - { value: biome_svelte,    label: "Biome" }
          - { value: custom_svelte,   label: "자체" }
    affects:
      - "CODING_CONVENTION.md / 스타일 가이드"

  - id: q6b
    title: 린터·포매터·자동화
    required: false
    depends_on: [q6a, q3]
    type: choice_matrix
    notes: "q6a와 함께 자동 권장됨. AI가 최적 도구를 먼저 제시하고 사용자가 수정 가능."
    matrix:
      - when: { "q3.backend": "spring-boot-3" }
        language: backend
        options:
          - { value: spotless_checkstyle, label: "Spotless + Checkstyle", default: true }
          - { value: spotless_spotbugs,   label: "Spotless + SpotBugs + PMD" }
          - { value: custom_jvm,          label: "자체" }
      - when: { "q3.backend": "spring-boot-3-kotlin" }
        language: backend
        options:
          - { value: ktlint_detekt, label: "ktlint + Detekt", default: true }
      - when: { "q3.backend": "nestjs" }
        language: backend
        options:
          - { value: eslint_prettier_be, label: "ESLint + Prettier", default: true }
          - { value: biome_be,           label: "Biome (단일)" }
      - when: { "q3.backend": ["fastapi", "django"] }
        language: backend
        options:
          - { value: black_ruff, label: "Black + Ruff", default: true }
          - { value: flake8_isort, label: "Flake8 + isort" }
      - when: { "q3.backend": ["gin", "echo", "fiber"] }
        language: backend
        options:
          - { value: golangci_lint, label: "golangci-lint", default: true, locked: true }
      - when: { "q3.backend": "aspnet" }
        language: backend
        options:
          - { value: dotnet_format, label: "dotnet format", default: true }
      - when: { "q3.frontend": ["react-18", "nextjs", "remix", "vue3", "nuxt", "svelte", "sveltekit"] }
        language: frontend
        options:
          - { value: eslint_prettier_fe, label: "ESLint + Prettier", default: true }
          - { value: biome_only,         label: "Biome (단일 도구)" }
          - { value: dprint,             label: "dprint" }
    follow_ups:
      all:
        - id: precommit_hook
          type: choice
          prompt: "Pre-commit hook"
          options:
