services:
  postgres:
    image: postgres:16-alpine
    container_name: bid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biddb}
      POSTGRES_USER: ${POSTGRES_USER:-biduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bidpass123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biduser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: bid_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123} --maxmemory 200mb --maxmemory-policy volatile-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.3'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bid_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-biduser}:${POSTGRES_PASSWORD:-bidpass123}@postgres:5432/${POSTGRES_DB:-biddb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass123}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-changeme-super-secret-key-2024}
      G2B_API_KEY: ${G2B_API_KEY:-}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@bid.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin1234}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      INPO21C_COOKIE: ${INPO21C_COOKIE:-}
      INPO21C_ID: ${INPO21C_ID:-}
      INPO21C_PW: ${INPO21C_PW:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/ml_models
      - ./backend/app:/app/app
    ports:
      - "${API_PORT:-8100}:8000"
    deploy:
      resources:
        limits:
          memory: 2048m
          cpus: '1.5'
        reservations:
          memory: 512m

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: bid_collector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-biduser}:${POSTGRES_PASSWORD:-bidpass123}@postgres:5432/${POSTGRES_DB:-biddb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass123}@redis:6379/0
      G2B_API_KEY: ${G2B_API_KEY:-}
      COLLECT_ENABLED: ${COLLECT_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./collector:/app
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: bid_frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.2'

  nginx:
    image: nginx:alpine
    container_name: bid_nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${APP_PORT:-3003}:80"
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.2'

volumes:
  pgdata:
  redisdata:
  ml_models:
